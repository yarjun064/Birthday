<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Happy Birthday </title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --overlay-bg: rgba(0,0,0,0.55);
      --panel-shadow: rgba(10,10,10,0.25);
      --card-accent: #7b3b2d;
      --card-shadow: rgba(11,12,15,0.08);
      --card-bg: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,255,255,0.98));
    }

    html,body{height:100%;margin:0;font-family: 'Montserrat', sans-serif;background:#222;display:flex;align-items:center;justify-content:center;}

    /* Overlay visible by default */
    .overlay {
      position:fixed; inset:0;
      background: var(--overlay-bg);
      display:flex; align-items:center; justify-content:center;
      z-index:1000; padding:20px;
    }

    /* The card IS the modal panel — no extra wrapping box */
    .card{
      width:420px; /* slightly larger like original modal width */
      max-width:94vw;
      background: var(--card-bg);
      border-radius:18px;
      padding:28px 24px 32px;
      box-shadow: 0 24px 46px var(--panel-shadow);
      position:relative;
      overflow:hidden;
      border:1px solid rgba(0,0,0,0.03);
    }

    /* confetti viewport sits above card but pointer-events:none */
    .cracker-viewport {
      position:absolute; left:0; top:0;
      width:100%; height:100%;
      overflow:visible; pointer-events:none; z-index:30;
    }
    .cracker { position:absolute; width:8px; height:14px; border-radius:2px; opacity:0.95; will-change: top, transform, opacity; animation-name: fall; animation-timing-function: linear; animation-fill-mode: forwards; box-shadow:0 1px 2px rgba(0,0,0,0.06); }
    @keyframes fall {
      0% { top: -28px; transform: translateX(0) rotate(0deg); opacity: 1; }
      100% { top: calc(100% + 30px); transform: translateX(var(--drift, 0px)) rotate(720deg); opacity: 0.32; }
    }

    /* ----- Birthday card inner styles (kept intact) ----- */
    .flowers svg{position:absolute;opacity:0.95}
    .flower-top-left{left:10px;top:6px;width:72px;transform:rotate(-10deg)}
    .flower-top-right{right:6px;top:6px;width:80px}
    .flower-bottom{left:22px;bottom:6px;width:110px}

    header{display:flex;flex-direction:column;align-items:center;margin-top:6px}
    h1{font-family:'Playfair Display', serif;margin:0;font-size:34px;color:var(--card-accent);letter-spacing:1px}
    h1 .script{font-weight:700;font-style:italic;display:block;font-size:28px;color:#9b5a3f}
    .subtitle{font-size:12px;margin-top:8px;color:#6a4f49;letter-spacing:2px}

    .photo-wrap{width:100%;display:flex;justify-content:center;margin-top:14px;position:relative;}
    .frame{width:78%;background:#fff;border-radius:6px;padding:8px;padding-bottom:14px;box-shadow:0 6px 18px rgba(17,16,15,0.06);border:6px solid #f2e8e2;animation:popIn 700ms ease both;}
    @keyframes popIn{from{opacity:0;transform:translateY(8px) scale(0.98)}to{opacity:1;transform:none}}
    .profile{display:block;width:100%;height:260px;object-fit:cover;border-radius:4px;box-shadow:0 6px 18px rgba(0,0,0,0.06);}

    .polaroid{position:absolute;width:72px;height:72px;background:#fff;padding:6px;border-radius:6px;box-shadow:0 8px 18px rgba(11,12,15,0.08);transform:rotate(-12deg);overflow:hidden}
    .polaroid img{width:100%;height:100%;object-fit:cover;border-radius:4px}
    .pol1{right:10%;top:12%;transform:rotate(-8deg);animation:floaty 6s ease-in-out infinite}
    .pol2{left:10%;top:55%;transform:rotate(8deg);animation:floaty 5s ease-in-out infinite}
    @keyframes floaty{0%{transform:translateY(0) rotate(7deg)}50%{transform:translateY(-6px) rotate(-4deg)}100%{transform:translateY(0) rotate(-6deg)}}

    .message{font-size:13px;color:#3e2e2d;text-align:center;margin-top:14px;padding:0 18px;line-height:1.4}
    .credit{position:absolute;right:14px;bottom:12px;font-size:10px;color:#7a6058}

    /* responsive */
    @media (max-width:520px){
      .card{width:92vw;padding:20px}
      .profile{height:200px}
    }
  </style>
</head>

  <script>
    (function(){
      const viewport = document.getElementById('crackerViewport');
      let spawnInterval = null;
      let activeCount = 0;
      const MAX_ACTIVE = 20; // never let more than this many particles exist

      function random(min, max){ return Math.random()*(max-min)+min; }

      function createCracker(){
        if(activeCount >= MAX_ACTIVE) return; // keep it light
        activeCount++;

        const el = document.createElement('div');
        el.className = 'cracker';

        // smaller sizes on average so they don't cover the photo
        const w = Math.round(random(5,9));
        el.style.width = w + 'px';
        el.style.height = Math.round(w * 1.3) + 'px';

        const hue = Math.floor(random(0,360));
        el.style.background = `hsl(${hue} 86% 62%)`;

        // spawn near center of the card (48% - 52%) to feel centered but compact
        el.style.left = (random(48,52)) + '%';
        el.style.top = '-28px';

        // slower fall: increase duration range
        const dur = random(3.8, 6.0).toFixed(2) + 's';
        el.style.animationDuration = dur;

        // smaller drift so confetti doesn't fly far over the card
        const drift = Math.round(random(-48, 48));
        el.style.setProperty('--drift', drift + 'px');
        el.style.transform = `rotate(${Math.round(random(-40,40))}deg)`;
        el.style.opacity = (random(0.75,0.98)).toFixed(2);

        viewport.appendChild(el);

        // cleanup after animation ends
        const lifetime = parseFloat(dur) * 1000 + 300;
        setTimeout(() => {
          if(el && el.parentNode) el.parentNode.removeChild(el);
          activeCount = Math.max(0, activeCount - 1);
        }, lifetime);
      }

      function startCrackers(){
        if(spawnInterval) return;
        // much slower spawn cadence and smaller batches
        spawnInterval = setInterval(() => {
          const batch = Math.floor(random(1,3)); // 1..2 (sometimes 2)
          for(let i=0;i<batch;i++){
            setTimeout(createCracker, i*90 + Math.random()*80);
          }
        }, 700); // every 700ms, not 140ms
      }

      function stopCrackers(){
        if(spawnInterval){ clearInterval(spawnInterval); spawnInterval = null; }
        viewport.innerHTML = '';
        activeCount = 0;
      }

      // start when document loads
      window.addEventListener('load', ()=> {
        startCrackers();
      });

      // clicking card gives a small replay burst (keeps light)
      const card = document.querySelector('.card');
      if(card){
        card.addEventListener('click', ()=> {
          for(let i=0;i<2;i++){ setTimeout(createCracker, i*150); }
        });
      }

      // no close button, no overlay-click close, no Esc close as requested
    })();
  </script>
